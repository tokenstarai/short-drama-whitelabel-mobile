name: Mobile Flutter

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**"
      - ".github/workflows/mobile-flutter.yml"
  push:
    branches:
      - main
    paths:
      - "**"
      - ".github/workflows/mobile-flutter.yml"

jobs:
  test:
    runs-on: macos-15
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: ./scripts/check_mobile.sh
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-template-handoff
          path: |
            build/open-source/short-drama-whitelabel-mobile.zip
            build/open-source/open-source-template-manifest.json
            build/store-assets/mobile-store-assets.zip
            build/store-assets/store-assets-manifest.json
            build/ios-ci-handoff/mobile-ios-ci-handoff.zip
            build/ios-ci-handoff/ios-ci-handoff-manifest.json
            build/store-signing-handoff/mobile-store-signing-handoff.zip
            build/store-signing-handoff/store-signing-handoff-manifest.json
            build/store-publish-config/mobile-store-publish-config.zip
            build/store-publish-config/store-publish-config-manifest.json
            build/store-submission-evidence/store-submission-evidence.json
            build/store-submission-evidence/store-submission-evidence.template.json
            build/store-submission-evidence/store-submission-evidence.guide.md

  android-build:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        flavor: [coolshow, hongguo, douyin, hippo, reelshort]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: yes | sdkmanager --licenses
      - run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"
      - run: flutter pub get
      - run: ./scripts/build_flavor.sh "${{ matrix.flavor }}" android debug apk
      - run: ./scripts/build_flavor.sh "${{ matrix.flavor }}" android release apk
      - run: ./scripts/build_flavor.sh "${{ matrix.flavor }}" android release appbundle
      - run: ./scripts/write_release_manifest.sh
      - run: ./scripts/write_store_handoff_manifest.py
      - run: ./scripts/scan_release_artifacts.py
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-${{ matrix.flavor }}-android
          path: |
            build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-debug.apk
            build/app/outputs/flutter-apk/app-${{ matrix.flavor }}-release.apk
            build/app/outputs/bundle/**/app-${{ matrix.flavor }}-release.aab
            build/release-manifests/mobile-artifacts.json
            build/release-handoff/mobile-store-handoff.json

  ios-build:
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        flavor: [coolshow, hongguo, douyin, hippo, reelshort]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: xcodebuild -version
      - run: pod --version
      - run: flutter pub get
      - run: ./scripts/check_native_config.sh
      - run: ./scripts/build_flavor.sh "${{ matrix.flavor }}" ios debug
      - run: ./scripts/build_flavor.sh "${{ matrix.flavor }}" ios release
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-${{ matrix.flavor }}-ios-unsigned
          path: build/ios/iphoneos/Runner.app

  ios-ci-evidence:
    runs-on: macos-15
    needs: ios-build
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: mobile-*-ios-unsigned
          path: build/ci-ios
          merge-multiple: false
      - run: python3 scripts/import_ios_ci_artifacts.py --strict
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-ios-ci-artifact-evidence
          path: |
            build/ios-ci-evidence/ios-ci-artifacts.json
            build/ios-ci-evidence/app-info/*.json
