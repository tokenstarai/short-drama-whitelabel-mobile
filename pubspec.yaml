name: short_drama_whitelabel
description: Flutter whitelabel app template for the short-drama SaaS tenant edge adapter.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  app_links: ^7.1.2
  flutter:
    sdk: flutter
  in_app_purchase: ^3.2.3
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/golden/
    - assets/config/purple/
    - assets/config/blue/
    - assets/config/coolshow/
    - assets/config/hongguo/
    - assets/config/douyin/
    - assets/config/hippo/
    - assets/config/reelshort/
    - assets/visuals/
